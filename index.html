<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IssueTracker - Assignment 5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <style>
        .card-open {
            border-top: 6px solid #22c55e;
        }

        
        .card-closed {
            border-top: 6px solid #a855f7;
        }

       

        .tabs-boxed .tab-active {
            background-color: #a855f7 !important;
            color: white !important;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">

    <section id="login-page" class="flex items-center justify-center min-h-screen">
        <div class="card w-96 bg-base-100 shadow-xl p-8 border border-gray-100">
            <div class="flex flex-col items-center justify-center mb-6">
                <img src="assets/github-logo.png" alt="">
                <h1 class="text-3xl font-bold text-black mb-2">Github Issue Tracker</h1>
                <p class="text-gray-500 text-sm">Sign in to manage your repository issues</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div class="form-control">
                    <label class="label"><span class="label-text font-bold">Username</span></label>
                    <input type="text" id="username" placeholder="admin" class="input input-bordered w-full" required />
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text font-bold">Password</span></label>
                    <input type="password" id="password" placeholder="admin123" class="input input-bordered w-full"
                        required />
                </div>
                <button type="submit" class="btn btn-primary w-full mt-4">Sign In</button>
            </form>
            <div class="mt-6 p-3 bg-blue-50 rounded-lg text-xs text-black-700 flex flex-col items-center justify-center">
                <p><strong>Demo Credential:</strong></p>
                <div class="pt-4 flex flex-col items-center justify-center">
                     <p>User: admin</p>
                    <p>Pass: admin123</p>
                </div>
            </div>
        </div>
    </section>

    <section id="main-page" class="hidden">
        <nav class="navbar bg-base-100 shadow-sm px-4 lg:px-12 sticky top-0 z-50">
            <div class="flex-1 gap-2">
                <img class="w-10 h-10" src="assets/github-logo.png" alt="logo" srcset="">
                <a class="text-xl font-bold text-black cursor-pointer">GitHub Issues Tracker</a>
            </div>
            <div class="flex-none gap-2">
                <div class="join">
                    <input id="search-input" type="text" placeholder="Search issues..."
                        class="input input-bordered join-item input-sm md:input-md" />
                    <button id="search-btn" class="btn btn-primary join-item btn-sm md:input-md">Search</button>
                </div>
               
            </div>

        </nav>

        <main class="container mx-auto p-4 lg:p-12">

            <div class="bg-white flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <div role="tablist" class="tabs tabs-boxed bg-white p-4 gap-2">
                    <a role="tab" class="tab tab-active border border-gray-200"
                        onclick="filterData('all', this)">All</a>
                    <a role="tab" class="tab border border-gray-200" onclick="filterData('open', this)">Open</a>
                    <a role="tab" class="tab border border-gray-200" onclick="filterData('closed', this)">Closed</a>
                </div>
                <div class="flex items-center gap-4 text-sm font-medium">
                    <span class="flex items-center gap-1">.</span>

                </div>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-white">
                <div class="flex items-center gap-3 p-4">

                    <!-- Icon -->
                    <div class="w-10 h-10 flex items-center justify-center rounded-full bg-purple-100">
                        <img src="assets/Aperture.png" alt="" srcset="">
                    </div>

                  
                    <div>
                        <h2 class="font-semibold text-gray-700">
                            <span id="issue-count">0</span> Issues
                        </h2>
                        <p class="text-sm text-gray-500">
                            Track and manage your project issues
                        </p>
                    </div>

                </div>

                <div class="flex items-center gap-4 text-sm font-medium">
                    <div class="flex items-center gap-4 text-sm font-medium">
    <span class="flex items-center gap-1">
        <span class="badge badge-success badge-xs"></span>
        Open
    </span>

    <span class="flex items-center gap-1">
        <span class="w-2.5 h-2.5 bg-purple-500 rounded-full"></span>
        Closed
    </span>
</div>
                  
                </div>
            </div>

            <div id="loader" class="flex justify-center my-20 hidden">
                <span class="loading loading-spinner loading-lg text-primary"></span>
            </div>

            <div id="issues-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            </div>
        </main>
    </section>

    <dialog id="issue_modal" class="modal">
        <div class="modal-box w-11/12 max-w-2xl">
            <h3 id="modal-title" class="text-2xl font-bold"></h3>
            <div id="modal-content" class="py-4 space-y-3">
            </div>
            <div class="modal-action">

            </div>
        </div>
    </dialog>

    <script src="../script.js"></script>
</body>

</html>
